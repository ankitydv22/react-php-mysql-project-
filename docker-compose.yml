version: "3.8"

services:
  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"
    network:
      - app-network

  backend:
    image: php:8-apache
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8080:80"
    networks:
      - app-network
    
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: mydb
    networks:
      - app-network

networks:
  app-network:
    driver: bridge